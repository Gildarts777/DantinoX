model:
  dim: 512
  n_heads: 16
  kv_heads: 4
  head_size: 32
  num_blocks: 12
  max_context: 512
  weight_tying: true
  activation: gelu
  gradient_checkpointing: true
  dropout_rate: 0.15
  
moe:
  use_moe: true
  n_experts: 4
  top_k_mlp: 2
  expansion: 4
  alpha_balance: 0.1

attention:
  use_rotary_pos: true
  trainable_pos: false    
  absolute_pos: false     
  sliding_window: true
  context_window: 64
  no_sink: true

tokenizer:
  tokenizer_type: "char"      
  vocab_size: 2000
  tokenizer_path: "configs/vocab.json"

data:
  dataset_source: "huggingface" 
  dataset_name: "Daniele/dante-corpus" 
  streaming: true              

training:
  lr: 0.0015
  batch_size: 64
  grad_accum: 4
  seed: 42
  optimizer: "adamw"           
  epochs: 100 #1000
  warmup_steps: 0 #100

logging:
  eval_iters: 20
  log_file: "training_log.csv"
  summary_file: "model_summary.json"