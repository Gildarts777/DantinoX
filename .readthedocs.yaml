# .readthedocs.yaml
# ReadTheDocs configuration for DantinoX documentation.
# Full reference: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# Build with MkDocs (Material theme)
mkdocs:
  configuration: mkdocs.yml

# Install documentation dependencies
python:
  install:
    - requirements: docs/requirements.txt
