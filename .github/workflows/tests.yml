name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          pip install --upgrade pip
          pip install "jax[cpu]" jaxlib
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check dantinox/ core/ utils/

      - name: Type-check with mypy
        run: mypy dantinox/ core/
        continue-on-error: true   # non-blocking until full annotation coverage is reached

      - name: Run tests
        env:
          JAX_PLATFORM_NAME: cpu
          CUDA_VISIBLE_DEVICES: ""
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_sweep_simulation.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: .coverage
