site_name: DantinoX
site_url: https://dantinox.readthedocs.io/en/latest/
site_description: >-
  A high-performance JAX/Flax NNX transformer library for autoregressive,
  discrete diffusion, and continuous flow-matching language models.
site_author: Marco Simoni
repo_url: https://github.com/winstonsmith1897/DantinoX
repo_name: winstonsmith1897/DantinoX
copyright: Copyright &copy; 2026 Marco Simoni — MIT License

# ── Theme ─────────────────────────────────────────────────────────────────────
theme:
  name: material
  logo: images/dantinox-transparent.png
  favicon: images/dantinox.png
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    admonition:
      note:     octicons/tag-16
      tip:      octicons/squirrel-16
      warning:  octicons/alert-16
      danger:   octicons/zap-16
      info:     octicons/info-16
      abstract: octicons/checklist-16
      example:  octicons/beaker-16
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
  - minify:
      minify_html: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_signature_annotations: true
            show_if_no_docstring: false
            separate_signature: true
            merge_init_into_class: true
            filters: ["!^_"]
            members_order: source
            heading_level: 2

# ── Markdown extensions ───────────────────────────────────────────────────────
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - toc:
      permalink: true
      toc_depth: 3

# ── Extra assets ──────────────────────────────────────────────────────────────
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascript/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

