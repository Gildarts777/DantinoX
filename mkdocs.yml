site_name: DantinoX
site_description: A high-performance, from-scratch LLM natively built in JAX and Flax NNX.
site_author: Marco Simoni
repo_url: https://github.com/winstonsmith1897/DantinoX
repo_name: winstonsmith1897/DantinoX
copyright: Copyright &copy; 2026 Marco Simoni

theme:
  name: material
  logo: images/dantinox.png
  favicon: images/dantinox.png
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    admonition:
      note:    octicons/tag-16
      tip:     octicons/squirrel-16
      warning: octicons/alert-16
      danger:  octicons/zap-16
      info:    octicons/info-16
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - header.autohide
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
  - minify:
      minify_html: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md

  - Architecture:
    - Overview: architecture.md

  - Generation Paradigms:
    - Overview: paradigms/index.md
    - Autoregressive: paradigms/autoregressive.md
    - Masked Diffusion: paradigms/diffusion.md
    - Fast-dLLM DualCache: paradigms/fast-dllm.md
    - Confidence-Aware Decoding: paradigms/confidence.md
    - AR vs Diffusion: paradigms/comparison.md

  - Training:
    - Overview: training/index.md
    - Autoregressive: training/autoregressive.md
    - Diffusion: training/diffusion.md
    - Hyperparameter Sweeps: training/sweeps.md
    - Multi-GPU: training/multi-gpu.md

  - Inference:
    - Overview: inference/index.md
    - AR Generation: inference/autoregressive.md
    - Diffusion Generation: inference/diffusion.md
    - KV-Cache: inference/kv-cache.md

  - Benchmarks:
    - Overview: benchmarks.md
    - Ablation Studies: ablation_studies.md

  - API Reference: api.md
  - Coverage Report: coverage/index.html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/winstonsmith1897/DantinoX
